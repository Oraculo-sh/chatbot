# vscode-language: dockercompose
name: chatbot

x-base: &base
  restart: always
  logging:
    driver: "json-file"
    options:
      max-size: "20m"
      max-file: "3"

x-servicebase: &servicebase
  depends_on:
    redis-chatbot:
      condition: service_healthy
    postgres-chatbot:
      condition: service_healthy
    minio-chatbot:
      condition: service_started
  networks:
    - rede_proxy
    - rede_chatbot

x-n8n-shared: &n8n-shared
  image: docker.n8n.io/n8nio/n8n
  env_file: ./envs/n8n.env
  environment:
    - DB_POSTGRESDB_PASSWORD=${DB_PASS_N8N}
    - QUEUE_BULL_REDIS_PASSWORD=${REDIS_PASS}
    - N8N_ENCRYPTION_KEY=${ENCRYPTION_KEY}
    - N8N_RUNNERS_AUTH_TOKEN=${RUNNERS_AUTH_TOKEN}
    - WEBHOOK_URL=${PROTOCOL}://n8n.${DOMAIN}
  volumes:
    - n8n_storage:/home/node/.n8n

x-n8n-runner: &n8n-runner
  image: n8nio/runners
  environment:
    - N8N_RUNNERS_AUTH_TOKEN=${RUNNERS_AUTH_TOKEN}
  networks:
    - rede_chatbot

# --- INFRAESTRUTURA BASE ---
services:
  postgres-chatbot:
    image: pgvector/pgvector:pg16
    container_name: postgres-chatbot
    <<: *base
    environment:
      # Credenciais de acesso ao banco de dados root
      POSTGRES_USER: ${POSTGRES_ROOT_USER}
      POSTGRES_PASSWORD: ${POSTGRES_ROOT_PASS}
      POSTGRES_DB: ${POSTGRES_ROOT_DB}
      # Senhas de bancos isolados
      DB_PASS_EVOLUTION: ${DB_PASS_EVOLUTION}
      DB_PASS_N8N: ${DB_PASS_N8N}
      DB_PASS_CHATWOOT: ${DB_PASS_CHATWOOT}
      DB_PASS_TYPEBOT: ${DB_PASS_TYPEBOT}
    command: [ "postgres", "-c", "max_connections=1000", "-c", "shared_buffers=512MB" ]
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_ROOT_USER} -d ${POSTGRES_ROOT_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    networks:
      - rede_chatbot

  redis-chatbot:
    image: redis:7-alpine
    container_name: redis-chatbot
    <<: *base
    command: redis-server --requirepass ${REDIS_PASS} --appendonly yes
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli -a '${REDIS_PASS}' ping | grep PONG" ]
      start_period: 20s
      interval: 30s
      retries: 5
      timeout: 3s
    volumes:
      - redis_data:/data
    networks:
      - rede_chatbot

  minio-chatbot:
    image: minio/minio
    container_name: minio-chatbot
    <<: *base
    restart: "no"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASS}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - rede_chatbot
      - rede_proxy

  minio-setup:
    image: minio/mc
    container_name: minio-setup
    restart: "no"
    depends_on:
      - minio-chatbot
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASS: ${MINIO_ROOT_PASS}
    entrypoint: |
      /bin/sh -c "
      sleep 20;
      # 1. Configuramos o alias com aspas fortes para evitar erro de hostname
      /usr/bin/mc alias set chatbot http://minio-chatbot:9000 \"$${MINIO_ROOT_USER}\" \"$${MINIO_ROOT_PASS}\";

      # 2. Criamos o bucket usando o alias que acabamos de definir
      /usr/bin/mc mb --ignore-existing chatbot/typebot;
      /usr/bin/mc mb --ignore-existing chatbot/chatwoot;

      # 3. Definimos a permissão
      /usr/bin/mc anonymous set public chatbot/typebot;

      echo 'Configuração finalizada com sucesso!';
      exit 0;
      "
    networks:
      - rede_chatbot

  # --- EVOLUTION API ---
  evolution-api:
    image: evoapicloud/evolution-api:latest
    container_name: evolution-api
    <<: [ *base, *servicebase ]
    env_file: ./envs/evolution.env
    environment:
      - DATABASE_CONNECTION_URI=postgresql://evolution_user:${DB_PASS_EVOLUTION}@postgres-chatbot:5432/evolution_db?schema=evolution_api
      - CACHE_REDIS_URI=redis://:${REDIS_PASS}@redis-chatbot:6379/1
      - CHATWOOT_IMPORT_DATABASE_CONNECTION_URI=postgresql://chatwoot_user:${DB_PASS_CHATWOOT}@postgres-chatbot:5432/chatwoot_db?sslmode=disable
    volumes:
      - evolution_instances:/evolution/instances

  evolution-frontend:
    image: evoapicloud/evolution-manager:latest
    container_name: evolution-frontend
    <<: [ *base, *servicebase ]
    env_file: ./envs/evolution.env
    depends_on:
      evolution-api:
        condition: service_started
    volumes:
      # Patch de correção do Nginx aplicado e testado - 10/03/2026.
      - ./config/nginx/nginx.conf:/etc/nginx/conf.d/nginx.conf:ro

  # --- TYPEBOT ---
  typebot-builder:
    image: baptistearno/typebot-builder:latest
    container_name: typebot-builder
    <<: [ *base, *servicebase ]
    env_file: ./envs/typebot.env
    environment:
      - DATABASE_URL=postgresql://typebot_user:${DB_PASS_TYPEBOT}@postgres-chatbot:5432/typebot_db
      - REDIS_URL=redis://:${REDIS_PASS}@redis-chatbot:6379/2

  typebot-viewer:
    image: baptistearno/typebot-viewer:latest
    container_name: typebot-viewer
    <<: [ *base, *servicebase ]
    env_file: ./envs/typebot.env
    environment:
      - DATABASE_URL=postgresql://typebot_user:${DB_PASS_TYPEBOT}@postgres-chatbot:5432/typebot_db
      - REDIS_URL=redis://:${REDIS_PASS}@redis-chatbot:6379/2

  # --- CHATWOOT ---
  chatwoot-rails:
    image: chatwoot/chatwoot:latest
    container_name: chatwoot-rails
    <<: [ *base, *servicebase ]
    env_file: ./envs/chatwoot.env
    environment:
      - POSTGRES_PASSWORD=${DB_PASS_CHATWOOT}
      - REDIS_URL=redis://:${REDIS_PASS}@redis-chatbot:6379/3
      - REDIS_PASSWORD=${REDIS_PASS}
    entrypoint: docker/entrypoints/rails.sh
    command: [ 'bundle', 'exec', 'rails', 's', '-p', '3000', '-b', '0.0.0.0' ]
    volumes:
      - chatwoot_storage:/app/storage

  chatwoot-sidekiq:
    image: chatwoot/chatwoot:latest
    container_name: chatwoot-sidekiq
    <<: [ *base, *servicebase ]
    env_file: ./envs/chatwoot.env
    environment:
      - POSTGRES_PASSWORD=${DB_PASS_CHATWOOT}
      - REDIS_URL=redis://:${REDIS_PASS}@redis-chatbot:6379/3
    command: [ 'bundle', 'exec', 'sidekiq', '-C', 'config/sidekiq.yml' ]
    volumes:
      - chatwoot_storage:/app/storage
    networks:
      - rede_chatbot

  # --- N8N (WORKER & RUNNER TOPOLOGY) ---
  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n
    <<: [ *base, *servicebase, *n8n-shared ]

  n8n-runner:
    image: n8nio/runners
    container_name: n8n-runner
    <<: [ *base, *n8n-runner ]
    depends_on:
      - n8n
    environment:
      - N8N_RUNNERS_AUTH_TOKEN=${RUNNERS_AUTH_TOKEN}
      - N8N_RUNNERS_TASK_BROKER_URI=http://n8n:5679

  n8n-worker:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n-worker
    <<: [ *base, *n8n-shared ]
    depends_on:
      - n8n
    networks:
      - rede_chatbot
    command: worker

  n8n-worker-runner:
    container_name: n8n-worker-runner
    <<: [ *base, *n8n-runner ]
    depends_on:
      - n8n-worker
    environment:
      - N8N_RUNNERS_AUTH_TOKEN=${RUNNERS_AUTH_TOKEN}
      - N8N_RUNNERS_TASK_BROKER_URI=http://n8n-worker:5679

# --- REDES E VOLUMES DEFINITIVOS ---
networks:
  rede_proxy:
    external: true
    name: rede_proxy
  rede_chatbot:
    name: rede_chatbot
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  evolution_instances:
  chatwoot_storage:
  n8n_storage:
