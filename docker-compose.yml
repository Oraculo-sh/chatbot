name: chatbot

# --- ÂNCORAS ---
x-base: &base
  restart: always
  logging:
    driver: "json-file"
    options:
      max-size: "20m"
      max-file: "3"

x-servicebase: &servicebase
  depends_on:
    redis_chatbot:
      condition: service_healthy
    postgres_chatbot:
      condition: service_healthy
    minio_chatbot:
      condition: service_started
  networks:
    - rede_proxy
    - rede_chatbot

x-n8n_shared: &n8n_shared
  image: docker.n8n.io/n8nio/n8n
  environment:
    - DB_TYPE=postgresdb
    - DB_POSTGRESDB_HOST=postgres_chatbot
    - DB_POSTGRESDB_PORT=5432
    - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}
    - DB_POSTGRESDB_USER=${POSTGRES_NON_ROOT_USER}
    - DB_POSTGRESDB_PASSWORD=${POSTGRES_NON_ROOT_PASSWORD}
    - EXECUTIONS_MODE=queue
    - QUEUE_BULL_REDIS_HOST=redis_chatbot
    - QUEUE_HEALTH_CHECK_ACTIVE=true
    - QUEUE_BULL_REDIS_PASSWORD=${REDIS_PASS}
    - N8N_ENCRYPTION_KEY=${ENCRYPTION_KEY}
    - N8N_RUNNERS_MODE=external
    - N8N_RUNNERS_AUTH_TOKEN=${RUNNERS_AUTH_TOKEN}
    - N8N_RUNNERS_BROKER_LISTEN_ADDRESS=0.0.0.0
    - OFFLOAD_MANUAL_EXECUTIONS_TO_WORKERS=true
    - WEBHOOK_URL=https://n8n.local
    - GENERIC_TIMEZONE=America/Sao_Paulo
    - TZ=America/Sao_Paulo
    - N8N_SECURE_COOKIE=false
  volumes:
    - n8n_storage:/home/node/.n8n

x-n8n_runner: &n8n_runner
  image: n8nio/runners
  environment:
    - N8N_RUNNERS_AUTH_TOKEN=${RUNNERS_AUTH_TOKEN}
  networks:
    - rede_chatbot

# --- INFRAESTRUTURA BASE ---
services:

  postgres_chatbot:
    image: pgvector/pgvector:pg16
    container_name: postgres_chatbot
    <<: *base
    environment:
      POSTGRES_USER: postgres_admin
      POSTGRES_PASSWORD: ${POSTGRES_ROOT_PASS}
      POSTGRES_DB: postgres
      DB_PASS_EVOLUTION: ${DB_PASS_EVOLUTION}
      DB_PASS_N8N: ${DB_PASS_N8N}
      DB_PASS_CHATWOOT: ${DB_PASS_CHATWOOT}
      DB_PASS_TYPEBOT: ${DB_PASS_TYPEBOT}
    command: [ "postgres", "-c", "max_connections=1000", "-c", "shared_buffers=512MB" ]
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres_admin -d postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    networks:
      - rede_chatbot

  redis_chatbot:
    image: redis:7-alpine
    container_name: redis_chatbot
    <<: *base
    command: redis-server --requirepass ${REDIS_PASS} --appendonly yes
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli -a '${REDIS_PASS}' ping | grep PONG" ]
      start_period: 20s
      interval: 30s
      retries: 5
      timeout: 3s
    volumes:
      - redis_data:/data
    networks:
      - rede_chatbot

  minio_chatbot:
    image: minio/minio
    container_name: minio_chatbot
    <<: *base
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASS}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.minio.rule=Host(`s3-minio.local`)"
      - "traefik.http.routers.minio.service=minio-api"
      - "traefik.http.services.minio-api.loadbalancer.server.port=9000"
      - "traefik.http.routers.minio-console.rule=Host(`console-minio.local`)"
      - "traefik.http.routers.minio-console.service=minio-console"
      - "traefik.http.services.minio-console.loadbalancer.server.port=9001"
      - "traefik.docker.network=rede_proxy"
    networks:
      - rede_chatbot
      - rede_proxy

  minio_setup:
    image: minio/mc
    container_name: minio_setup
    depends_on:
      - minio_chatbot
    entrypoint: >
      /bin/sh -c " sleep 10; /usr/bin/mc alias set minio http://minio_chatbot:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASS}; /usr/bin/mc mb --ignore-existing minio/typebot minio/chatwoot minio/evolution; /usr/bin/mc anonymous set public minio/typebot/public; exit 0; "
    networks:
      - rede_chatbot

  # --- EVOLUTION API ---
  evolution_api:
    image: evoapicloud/evolution-api:latest
    container_name: evolution_api
    <<: [ *base, *servicebase ]
    env_file: ./envs/evolution.env
    environment:
      - DATABASE_CONNECTION_URI=postgresql://evolution_user:${DB_PASS_EVOLUTION}@postgres_chatbot:5432/evolution_db?schema=evolution_api
      - CACHE_REDIS_URI=redis://:${REDIS_PASS}@redis_chatbot:6379/1
    volumes:
      - evolution_instances:/evolution/instances
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.evolution.rule=Host(`api-evolution.local`)"
      - "traefik.http.services.evolution.loadbalancer.server.port=8080"
      - "traefik.docker.network=rede_proxy"

  evolution_frontend:
    image: evoapicloud/evolution-manager:latest
    container_name: evolution_frontend
    <<: [ *base, *servicebase ]
    env_file: ./envs/evolution.env
    depends_on:
      evolution_api:
        condition: service_started
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.evofront.rule=Host(`manager-evolution.local`)"
      - "traefik.http.services.evofront.loadbalancer.server.port=80"
      - "traefik.docker.network=rede_proxy"
    volumes:
      # Patch de correção do Nginx aplicado e testado - 10/03/2026.
      - ~/projet-paralel/evolution-manager-v2/.docker/nginx.conf:/etc/nginx/conf.d/nginx.conf:ro

  # --- TYPEBOT ---
  typebot_builder:
    image: baptistearno/typebot-builder:latest
    container_name: typebot_builder
    <<: [ *base, *servicebase ]
    env_file: ./envs/typebot.env
    environment:
      - DATABASE_URL=postgresql://typebot_user:${DB_PASS_TYPEBOT}@postgres_chatbot:5432/typebot_db
      - REDIS_URL=redis://:${REDIS_PASS}@redis_chatbot:6379/2
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.typebot-builder.rule=Host(`builder-typebot.local`)"
      - "traefik.http.services.typebot-builder.loadbalancer.server.port=3000"
      - "traefik.docker.network=rede_proxy"

  typebot_viewer:
    image: baptistearno/typebot-viewer:latest
    container_name: typebot_viewer
    <<: [ *base, *servicebase ]
    env_file: ./envs/typebot.env
    environment:
      - DATABASE_URL=postgresql://typebot_user:${DB_PASS_TYPEBOT}@postgres_chatbot:5432/typebot_db
      - REDIS_URL=redis://:${REDIS_PASS}@redis_chatbot:6379/2
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.typebot-viewer.rule=Host(`viewer-typebot.local`)"
      - "traefik.http.services.typebot-viewer.loadbalancer.server.port=3000"
      - "traefik.docker.network=rede_proxy"

  # --- CHATWOOT ---
  chatwoot_rails:
    image: chatwoot/chatwoot:latest
    container_name: chatwoot_rails
    <<: [ *base, *servicebase ]
    env_file: ./envs/chatwoot.env
    environment:
      - POSTGRES_HOST=postgres_chatbot
      - POSTGRES_DATABASE=chatwoot_db
      - POSTGRES_USERNAME=chatwoot_user
      - POSTGRES_PASSWORD=${DB_PASS_CHATWOOT}
      - REDIS_URL=redis://:${REDIS_PASS}@redis_chatbot:6379/3
    entrypoint: docker/entrypoints/rails.sh
    command: [ 'bundle', 'exec', 'rails', 's', '-p', '3000', '-b', '0.0.0.0' ]
    volumes:
      - chatwoot_storage:/app/storage
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.chatwoot.rule=Host(`chatwoot.local`)"
      - "traefik.http.services.chatwoot.loadbalancer.server.port=3000"
      - "traefik.docker.network=rede_proxy"

  chatwoot_sidekiq:
    image: chatwoot/chatwoot:latest
    container_name: chatwoot_sidekiq
    <<: [ *base, *servicebase ]
    env_file: ./envs/chatwoot.env
    environment:
      - POSTGRES_HOST=postgres_chatbot
      - POSTGRES_DATABASE=chatwoot_db
      - POSTGRES_USERNAME=chatwoot_user
      - POSTGRES_PASSWORD=${DB_PASS_CHATWOOT}
      - REDIS_URL=redis://:${REDIS_PASS}@redis_chatbot:6379/3
    command: [ 'bundle', 'exec', 'sidekiq', '-C', 'config/sidekiq.yml' ]
    volumes:
      - chatwoot_storage:/app/storage
    networks:
      - rede_chatbot

  # --- N8N (WORKER & RUNNER TOPOLOGY) ---
  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n_core
    <<: [ *base, *servicebase, *n8n_shared ]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.n8n.rule=Host(`n8n.local`)"
      - "traefik.http.services.n8n.loadbalancer.server.port=5678"
      - "traefik.docker.network=rede_proxy"

  n8n_runner:
    image: n8nio/runners
    container_name: n8n_runner
    <<: [ *base, *n8n_runner ]
    depends_on:
      - n8n
    environment:
      - N8N_RUNNERS_AUTH_TOKEN=${RUNNERS_AUTH_TOKEN}
      - N8N_RUNNERS_TASK_BROKER_URI=http://n8n:5679

  n8n_worker:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n_worker
    <<: [ *base, *n8n_shared ]
    depends_on:
      - n8n
    networks:
      - rede_chatbot
    command: worker

  n8n_worker_runner:
    container_name: n8n_worker_runner
    <<: [ *base, *n8n_runner ]
    depends_on:
      - n8n_worker
    environment:
      - N8N_RUNNERS_AUTH_TOKEN=${RUNNERS_AUTH_TOKEN}
      - N8N_RUNNERS_TASK_BROKER_URI=http://n8n_worker:5679

# --- REDES E VOLUMES DEFINITIVOS ---
networks:
  rede_chatbot:
    name: rede_chatbot
    driver: bridge
  rede_proxy:
    external: true
    name: rede_proxy

volumes:
  postgres_data:
  redis_data:
  minio_data:
  evolution_instances:
  chatwoot_storage:
  n8n_storage:
